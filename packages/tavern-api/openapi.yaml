openapi: 3.1.0
info:
  title: Tavern API
  version: 0.1.0
  summary: OpenAPI contract for Tavern Runtime chat and realtime clients.
  description: >
    Tavern API is the runtime-hosted contract for clients, bots, webhooks,
    automations, agent runtime, and tests. This first slice covers durable
    chat state and realtime recovery.
servers:
  - url: http://127.0.0.1:18790
    description: Local Tavern Runtime
tags:
  - name: Chats
  - name: Messages
  - name: Realtime
  - name: Agent CLI
paths:
  /api/chats:
    get:
      operationId: listChats
      tags: [Chats]
      summary: List chats.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: reader_id
          in: query
          schema:
            $ref: '#/components/schemas/UserParticipantId'
      responses:
        '200':
          description: Chats ordered by recent activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListChatsResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      operationId: createChat
      tags: [Chats]
      summary: Create a chat.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatRequest'
      responses:
        '201':
          description: Created chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '200':
          description: Existing chat returned for an idempotent request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}:
    get:
      operationId: getChat
      tags: [Chats]
      summary: Get a chat.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: reader_id
          in: query
          schema:
            $ref: '#/components/schemas/UserParticipantId'
      responses:
        '200':
          description: Chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/threads:
    post:
      operationId: ensureThread
      tags: [Chats]
      summary: Ensure the thread anchored on a chat message exists.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnsureThreadRequest'
      responses:
        '200':
          description: Existing or newly created thread chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/follow:
    put:
      operationId: setThreadFollow
      tags: [Chats]
      summary: Set a participant's follow state for a thread chat.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetThreadFollowRequest'
      responses:
        '200':
          description: Current follow state.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [followed]
                properties:
                  followed:
                    type: boolean
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/messages:
    get:
      operationId: listChatMessages
      tags: [Messages]
      summary: List chat messages by sequence.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: after_sequence
          in: query
          schema:
            type: integer
            minimum: 0
        - name: before_sequence
          in: query
          schema:
            type: integer
            minimum: 1
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Messages ordered by ascending sequence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      operationId: createChatMessage
      tags: [Messages]
      summary: Create a durable chat message.
      description: >
        Message creation is durable first. Duplicate message ids or duplicate
        nonces within a chat return the existing receipt instead of creating a
        second row.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Created message receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageReceipt'
        '200':
          description: Existing message receipt returned for idempotent retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/messages/search:
    get:
      operationId: searchChatMessages
      tags: [Messages]
      summary: Search chat messages by text.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Matching messages ordered by descending sequence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/timeline:
    get:
      operationId: getChatTimeline
      tags: [Chats]
      summary: Read one turn-aligned page of chat history.
      description: >
        Pages walk backward from the newest message by per-chat message
        sequence. A page carries whole turn units: its message window plus
        every response anchored to a window message by request or reply,
        with that response's full activity and artifacts. Windows extend
        downward so an in-window reply always ships with its request
        message; a turn whose request and reply straddle a page boundary is
        anchored to both pages and deduplicates by id. Responses with no
        message anchor ride the latest page only.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: reader_id
          in: query
          schema:
            $ref: '#/components/schemas/UserParticipantId'
        - name: before_sequence
          in: query
          description: >
            Exclusive upper bound on message sequence. Omit for the latest
            page; pass the previous page's next_before_sequence to walk
            older history.
          schema:
            type: integer
            minimum: 1
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: One turn-aligned timeline page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTimelinePage'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/responses/{response_id}/evidence:
    get:
      operationId: getResponseEvidence
      tags: [Chats]
      summary: Read one turn's execution evidence.
      description: >
        A turn's execution record — its activity and artifacts plus the
        owning response — queried on demand. Evidence never rides the chat
        timeline; consumers fetch it per turn.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - $ref: '#/components/parameters/ResponseId'
      responses:
        '200':
          description: One turn's execution evidence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEvidence'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/deliveries:
    post:
      operationId: createChatDelivery
      tags: [Messages]
      summary: Create an agent delivery and assistant message.
      description: >
        Delivery ids are idempotent. The nested assistant message still uses
        durable message identity; duplicate assistant message ids link the
        delivery to the existing message instead of creating a second message
        row.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeliveryRequest'
      responses:
        '201':
          description: Delivery receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryReceipt'
        '200':
          description: Existing delivery receipt returned for idempotent retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/responses:
    get:
      operationId: listChatResponses
      tags: [Chats]
      summary: List chat responses by update time.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: after_sequence
          in: query
          schema:
            type: integer
            minimum: 0
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Responses for one chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponsesResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      operationId: createChatResponse
      tags: [Chats]
      summary: Create or update a durable chat response.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertResponseRequest'
      responses:
        '200':
          description: Current response state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '201':
          description: Created response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/responses/{response_id}/activity:
    post:
      operationId: upsertResponseActivity
      tags: [Chats]
      summary: Create or update durable response activity.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - $ref: '#/components/parameters/ResponseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertResponseActivityRequest'
      responses:
        '200':
          description: Current response activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseActivity'
        '201':
          description: Created response activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseActivity'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/activity/{activity_id}:
    get:
      operationId: getResponseActivity
      tags: [Chats]
      summary: Get durable response activity by id.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Response activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseActivity'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/artifacts:
    post:
      operationId: createChatArtifact
      tags: [Chats]
      summary: Create or update a durable chat artifact.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertArtifactRequest'
      responses:
        '200':
          description: Current artifact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatArtifact'
        '201':
          description: Created artifact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatArtifact'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/read:
    post:
      operationId: markChatRead
      tags: [Chats]
      summary: Mark a chat read through a sequence.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkReadRequest'
      responses:
        '200':
          description: Read receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/clear:
    post:
      operationId: clearChat
      tags: [Chats]
      summary: Clear a chat's visible history.
      description: >
        Soft-deletes every message and response currently in the chat in one
        operation. Rows keep their sequence slots; new work after the clear
        appears normally.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      responses:
        '200':
          description: Clear receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearChatReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/responses/{response_id}:
    delete:
      operationId: deleteResponse
      tags: [Chats]
      summary: Soft delete a response and its activity.
      parameters:
        - $ref: '#/components/parameters/ResponseId'
      responses:
        '200':
          description: Deleted response receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponseReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/messages/{message_id}:
    get:
      operationId: getMessage
      tags: [Messages]
      summary: Get a message by id.
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
        default:
          $ref: '#/components/responses/Error'
  /api/turns/{run_id}/prompt:
    get:
      operationId: getTurnPrompt
      tags: [Chats]
      summary: Get the prompt evidence captured for one agent turn.
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Turn prompt evidence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnPromptEvidence'
        default:
          $ref: '#/components/responses/Error'
  /api/turns/{run_id}/file-changes:
    get:
      operationId: getTurnFileChanges
      tags: [Chats]
      summary: Get the workspace file-change evidence captured for one agent turn.
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Turn file-change evidence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnFileChangeEvidence'
        default:
          $ref: '#/components/responses/Error'
  /api/agent/messages/send:
    post:
      operationId: sendAgentMessage
      tags: [Agent CLI]
      summary: Send or freshness-hold an agent-authored message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSendRequest'
      responses:
        '200':
          description: Sent message or held draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSendResponse'
        default:
          $ref: '#/components/responses/AgentSendError'
  /api/agent/history:
    get:
      operationId: readAgentHistory
      tags: [Agent CLI]
      summary: Read target history and advance the served ledger.
      parameters:
        - $ref: '#/components/parameters/AgentTarget'
        - name: before
          in: query
          schema: { type: string }
        - name: after
          in: query
          schema: { type: string }
        - name: around
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Target history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHistoryResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/messages/search:
    get:
      operationId: searchAgentMessages
      tags: [Agent CLI]
      summary: Search messages across joined chats.
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - name: target
          in: query
          schema: { type: string }
        - name: sender
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [relevance, recent] }
        - name: before
          in: query
          schema: { type: string, format: date-time }
        - name: after
          in: query
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/Limit'
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Search matches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSearchResultList'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/messages/{id}:
    get:
      operationId: resolveAgentMessage
      tags: [Agent CLI]
      summary: Resolve a full or short message id.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: Resolved message.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [message]
                properties:
                  message:
                    $ref: '#/components/schemas/AgentMessage'
        '409':
          description: Ambiguous short id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentApiError'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/server:
    get:
      operationId: getAgentServerInfo
      tags: [Agent CLI]
      summary: List server channels and participant handles.
      parameters:
        - { name: channels, in: query, schema: { type: boolean } }
        - { name: agents, in: query, schema: { type: boolean } }
        - { name: humans, in: query, schema: { type: boolean } }
        - { name: joined, in: query, schema: { type: boolean } }
        - { name: query, in: query, schema: { type: string } }
        - $ref: '#/components/parameters/Limit'
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        '200':
          description: Filtered server directory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentServerInfo'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/channels/info:
    get:
      operationId: getAgentChannelInfo
      tags: [Agent CLI]
      summary: Get channel facts.
      parameters:
        - $ref: '#/components/parameters/AgentTarget'
      responses:
        '200':
          description: Channel facts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChannel'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/channels/members:
    get:
      operationId: getAgentChannelMembers
      tags: [Agent CLI]
      summary: List channel members.
      parameters:
        - $ref: '#/components/parameters/AgentTarget'
      responses:
        '200':
          description: Channel members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChannelMembers'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/tasks:
    get:
      operationId: listAgentTasks
      tags: [Agent CLI]
      summary: List task-messages visible to the calling agent.
      parameters:
        - name: target
          in: query
          schema: { type: string, minLength: 1 }
        - name: status
          in: query
          schema:
            type: string
            enum: [all, todo, in_progress, in_review, done, closed]
      responses:
        '200':
          description: Visible task-messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTaskListResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/tasks/create:
    post:
      operationId: createAgentTasks
      tags: [Agent CLI]
      summary: Create one or more task-messages.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTaskCreateRequest'
      responses:
        '200':
          description: Created task-messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTaskCreateResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/tasks/claim:
    post:
      operationId: claimAgentTasks
      tags: [Agent CLI]
      summary: Claim task-messages for the calling agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTaskClaimRequest'
      responses:
        '200':
          description: Claimed task-messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTaskClaimResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/tasks/unclaim:
    post:
      operationId: unclaimAgentTask
      tags: [Agent CLI]
      summary: Release one task claimed by the calling agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTaskUnclaimRequest'
      responses:
        '200':
          description: Updated task-message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTaskSingleResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/tasks/update:
    post:
      operationId: updateAgentTask
      tags: [Agent CLI]
      summary: Update one task status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTaskUpdateRequest'
      responses:
        '200':
          description: Updated task-message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTaskSingleResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/reminders:
    get:
      operationId: listAgentReminders
      tags: [Agent CLI]
      summary: List reminders owned by the calling agent.
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Owned reminders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentReminderListResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/reminders/log:
    get:
      operationId: readAgentReminderLog
      tags: [Agent CLI]
      summary: Read reminder fire history.
      parameters:
        - name: id
          in: query
          schema: { type: string, minLength: 1 }
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Reminder runs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentReminderLogResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/reminders/schedule:
    post:
      operationId: scheduleAgentReminder
      tags: [Agent CLI]
      summary: Schedule a reminder anchored to a readable message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentReminderScheduleRequest'
      responses:
        '200':
          description: Scheduled reminder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentReminderSingleResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/reminders/snooze:
    post:
      operationId: snoozeAgentReminder
      tags: [Agent CLI]
      summary: Snooze an owned reminder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentReminderSnoozeRequest'
      responses:
        '200':
          description: Snoozed reminder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentReminderSingleResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/reminders/update:
    post:
      operationId: updateAgentReminder
      tags: [Agent CLI]
      summary: Update one field of an owned reminder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentReminderUpdateRequest'
      responses:
        '200':
          description: Updated reminder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentReminderSingleResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/reminders/cancel:
    post:
      operationId: cancelAgentReminder
      tags: [Agent CLI]
      summary: Cancel an owned reminder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentReminderCancelRequest'
      responses:
        '200':
          description: Canceled reminder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentReminderSingleResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/attachments/upload:
    post:
      operationId: uploadAgentAttachment
      tags: [Agent CLI]
      summary: Upload an attachment for a later message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentAttachmentUploadRequest'
      responses:
        '200':
          description: Uploaded attachment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentAttachmentUploadResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/attachments/{id}:
    get:
      operationId: viewAgentAttachment
      tags: [Agent CLI]
      summary: Read a visible attachment.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: Attachment content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentAttachmentViewResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/profile:
    get:
      operationId: readAgentProfile
      tags: [Agent CLI]
      summary: Read the caller or another participant profile.
      parameters:
        - name: target
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Participant profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentProfileResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/profile/update:
    post:
      operationId: updateAgentProfile
      tags: [Agent CLI]
      summary: Update the calling agent's description.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentProfileResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/messages/react:
    post:
      operationId: reactToAgentMessage
      tags: [Agent CLI]
      summary: Add or remove a reaction on a readable message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentReactionRequest'
      responses:
        '200':
          description: Updated message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentReactionResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/skills:
    get:
      operationId: listAgentSkills
      tags: [Agent CLI]
      summary: List skills visible to the calling agent.
      responses:
        '200':
          description: Visible skill summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillListResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/skills/{id}:
    get:
      operationId: viewAgentSkill
      tags: [Agent CLI]
      summary: Read a skill and its file hashes.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentSkillId'
      responses:
        '200':
          description: Skill content and hashes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillViewResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/skills/create:
    post:
      operationId: createAgentSkill
      tags: [Agent CLI]
      summary: Create an agent-authored skill.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSkillCreateRequest'
      responses:
        '200':
          description: Created skill.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillCreateResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/skills/patch:
    post:
      operationId: patchAgentSkill
      tags: [Agent CLI]
      summary: Replace an owned skill's SKILL.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSkillPatchRequest'
      responses:
        '200':
          description: Skill file change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillChangeResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/agent/skills/write-file:
    post:
      operationId: writeAgentSkillFile
      tags: [Agent CLI]
      summary: Write an owned skill support file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSkillWriteFileRequest'
      responses:
        '200':
          description: Skill file change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillChangeResponse'
        default:
          $ref: '#/components/responses/AgentError'
  /api/events:
    get:
      operationId: listEvents
      tags: [Realtime]
      summary: List recent durable events.
      parameters:
        - name: after_cursor
          in: query
          description: Return events after this cursor (exclusive). Omit to read from the beginning.
          schema:
            type: string
        - name: recipient_id
          in: query
          description: Include private events addressed to this recipient.
          schema:
            $ref: '#/components/schemas/ParticipantId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Events ordered by ascending cursor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        default:
          $ref: '#/components/responses/Error'
  /api/events/ws:
    get:
      operationId: connectEvents
      tags: [Realtime]
      summary: Subscribe to event notifications.
      description: >
        WebSocket delivery is best effort and live-only. Clients recover missed
        state by refetching durable resources.
      parameters:
        - name: recipient_id
          in: query
          description: Include private events addressed to this recipient.
          schema:
            $ref: '#/components/schemas/ParticipantId'
      responses:
        '101':
          description: WebSocket upgrade. Messages are ChatEvent objects.
        default:
          $ref: '#/components/responses/Error'
components:
  parameters:
    AgentTarget:
      name: target
      in: query
      required: true
      schema:
        type: string
        minLength: 1
    ChatId:
      name: chat_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ChatId'
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RunId'
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    MessageId:
      name: message_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/MessageId'
    ResponseId:
      name: response_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ResponseId'
    ActivityId:
      name: activity_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ActivityId'
  responses:
    AgentError:
      description: Agent API error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentApiError'
    AgentSendError:
      description: Agent send API error with draft state when the target resolved.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentSendApiError'
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    AgentApiError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        nextAction: { type: string }
    AgentSendApiError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        draftSaved: { type: boolean }
        nextAction: { type: string }
    AgentSender:
      type: object
      additionalProperties: false
      required: [handle, description, type]
      properties:
        handle: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        type: { type: string, enum: [human, agent, system] }
    AgentMessage:
      allOf:
        - $ref: '#/components/schemas/ChatMessage'
        - type: object
          required: [sender]
          properties:
            sender:
              $ref: '#/components/schemas/AgentSender'
            threadId: { type: string, minLength: 1 }
            replyCount: { type: integer, minimum: 0 }
            replyTarget: { type: string, minLength: 1 }
    AgentSearchResult:
      allOf:
        - $ref: '#/components/schemas/AgentMessage'
        - type: object
          required: [target]
          properties:
            target: { type: string, minLength: 1 }
    AgentSearchResultList:
      type: object
      additionalProperties: false
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AgentSearchResult'
    AgentSendRequest:
      type: object
      additionalProperties: false
      required: [target]
      properties:
        target: { type: string, minLength: 1 }
        content: { type: string }
        attachmentIds:
          type: array
          items: { type: string, minLength: 1 }
        sendDraft: { type: boolean }
        continueAnyway: { type: boolean }
        compositionId: { type: string, minLength: 1 }
        nonce: { type: string, minLength: 1 }
    AgentSentMessage:
      type: object
      additionalProperties: false
      required: [state, message, recentUnread]
      properties:
        state: { type: string, const: sent }
        message:
          $ref: '#/components/schemas/AgentMessage'
        recentUnread:
          type: array
          items:
            $ref: '#/components/schemas/AgentRecentUnread'
    AgentRecentUnread:
      type: object
      additionalProperties: false
      required: [target, message]
      properties:
        target: { type: string, minLength: 1 }
        message:
          $ref: '#/components/schemas/AgentMessage'
    AgentHeldMessage:
      type: object
      additionalProperties: false
      required: [state, newMessageCount, shownMessages, omittedMessageCount, formalMentionCount, reholdCount, continueAnywaySuggested]
      properties:
        state: { type: string, const: held }
        newMessageCount: { type: integer, minimum: 1 }
        shownMessages:
          type: array
          maxItems: 12
          items:
            $ref: '#/components/schemas/AgentMessage'
        omittedMessageCount: { type: integer, minimum: 0 }
        formalMentionCount: { type: integer, minimum: 0 }
        reholdCount: { type: integer, minimum: 1 }
        continueAnywaySuggested: { type: boolean }
    AgentSendResponse:
      oneOf:
        - $ref: '#/components/schemas/AgentSentMessage'
        - $ref: '#/components/schemas/AgentHeldMessage'
      discriminator:
        propertyName: state
        mapping:
          sent: '#/components/schemas/AgentSentMessage'
          held: '#/components/schemas/AgentHeldMessage'
    AgentHistoryResponse:
      type: object
      additionalProperties: false
      required: [target, messages, has_more, has_older, has_newer, last_read]
      properties:
        target: { type: string }
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AgentMessage'
        has_more: { type: boolean }
        has_older: { type: boolean }
        has_newer: { type: boolean }
        last_read:
          type: object
          additionalProperties: false
          required: [after, unread_after]
          properties:
            after: { type: integer, minimum: 0 }
            unread_after: { type: integer, minimum: 0 }
    AgentDirectoryPerson:
      type: object
      additionalProperties: false
      required: [handle, description]
      properties:
        handle: { type: string }
        description: { type: [string, 'null'] }
    AgentChannel:
      type: object
      additionalProperties: false
      required: [handle, joined, description, memberCount]
      properties:
        handle: { type: string }
        joined: { type: boolean }
        description: { type: [string, 'null'] }
        memberCount: { type: integer, minimum: 0 }
    AgentServerInfo:
      type: object
      additionalProperties: false
      required: [channels, agents, humans, limit, offset, total, hasMore]
      properties:
        channels:
          type: array
          items:
            $ref: '#/components/schemas/AgentChannel'
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentDirectoryPerson'
        humans:
          type: array
          items:
            $ref: '#/components/schemas/AgentDirectoryPerson'
        limit: { type: integer }
        offset: { type: integer }
        total:
          type: object
          additionalProperties: false
          required: [channels, agents, humans]
          properties:
            channels: { type: integer, minimum: 0 }
            agents: { type: integer, minimum: 0 }
            humans: { type: integer, minimum: 0 }
        hasMore:
          type: object
          additionalProperties: false
          required: [channels, agents, humans]
          properties:
            channels: { type: boolean }
            agents: { type: boolean }
            humans: { type: boolean }
    AgentChannelMember:
      type: object
      additionalProperties: false
      required: [handle, description, role]
      properties:
        handle: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        role: { type: string, enum: [human, agent] }
    AgentChannelMembers:
      type: object
      additionalProperties: false
      required: [target, members]
      properties:
        target: { type: string }
        members:
          type: array
          items:
            $ref: '#/components/schemas/AgentChannelMember'
    AgentTaskStatus:
      type: string
      enum: [todo, in_progress, in_review, done, closed]
    AgentTaskRow:
      type: object
      additionalProperties: false
      required: [assignee, message, number, status, target]
      properties:
        assignee: { type: [string, 'null'] }
        message:
          $ref: '#/components/schemas/AgentMessage'
        number: { type: integer, minimum: 1 }
        status:
          $ref: '#/components/schemas/AgentTaskStatus'
        target: { type: [string, 'null'] }
    AgentTaskListResponse:
      type: object
      additionalProperties: false
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/AgentTaskRow'
    AgentTaskCreateResponse:
      type: object
      additionalProperties: false
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/AgentTaskRow'
    AgentTaskClaimResponse:
      type: object
      additionalProperties: false
      required: [claimed]
      properties:
        claimed:
          type: array
          items:
            $ref: '#/components/schemas/AgentTaskRow'
    AgentTaskSingleResponse:
      type: object
      additionalProperties: false
      required: [task]
      properties:
        task:
          $ref: '#/components/schemas/AgentTaskRow'
    AgentTaskCreateRequest:
      type: object
      additionalProperties: false
      required: [target]
      properties:
        assignee: { type: string, minLength: 1 }
        content: { type: string }
        target: { type: string, minLength: 1 }
        titles:
          type: array
          maxItems: 20
          items: { type: string, minLength: 1 }
    AgentTaskClaimRequest:
      type: object
      additionalProperties: false
      required: [target]
      properties:
        messageId: { type: string, minLength: 1 }
        numbers:
          type: array
          maxItems: 20
          items: { type: integer, minimum: 1 }
        target: { type: string, minLength: 1 }
      oneOf:
        - required: [messageId]
          not:
            required: [numbers]
        - required: [numbers]
          not:
            required: [messageId]
    AgentTaskUnclaimRequest:
      type: object
      additionalProperties: false
      required: [number, target]
      properties:
        number: { type: integer, minimum: 1 }
        target: { type: string, minLength: 1 }
    AgentTaskUpdateRequest:
      type: object
      additionalProperties: false
      required: [number, status, target]
      properties:
        number: { type: integer, minimum: 1 }
        status:
          $ref: '#/components/schemas/AgentTaskStatus'
        target: { type: string, minLength: 1 }
    AgentReminder:
      type: object
      additionalProperties: false
      required: [anchorTarget, fireAt, id, repeat, script, status, title]
      properties:
        anchorTarget: { type: string }
        fireAt: { type: string, format: date-time }
        id: { type: string }
        repeat: { type: [string, 'null'] }
        script: { type: boolean }
        status: { type: string }
        title: { type: string }
    AgentReminderSingleResponse:
      type: object
      additionalProperties: false
      required: [reminder]
      properties:
        reminder:
          $ref: '#/components/schemas/AgentReminder'
    AgentReminderListResponse:
      type: object
      additionalProperties: false
      required: [reminders]
      properties:
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/AgentReminder'
    AgentReminderRun:
      type: object
      additionalProperties: false
      required: [firedAt, id, outcome, output, reminderId, scriptExitCode]
      properties:
        firedAt: { type: string, format: date-time }
        id: { type: string }
        outcome: { type: string }
        output: { type: [string, 'null'] }
        reminderId: { type: string }
        scriptExitCode: { type: [integer, 'null'] }
    AgentReminderLogResponse:
      type: object
      additionalProperties: false
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: '#/components/schemas/AgentReminderRun'
    AgentReminderScheduleRequest:
      type: object
      additionalProperties: false
      required: [messageId, title]
      properties:
        delaySeconds: { type: integer, minimum: 1 }
        fireAt: { type: string, minLength: 1 }
        messageId: { type: string, minLength: 1 }
        repeat: { type: string, minLength: 1 }
        script: { type: string, minLength: 1 }
        title: { type: string, minLength: 1, maxLength: 300 }
      oneOf:
        - required: [delaySeconds]
          not:
            required: [fireAt]
        - required: [fireAt]
          not:
            required: [delaySeconds]
    AgentReminderSnoozeRequest:
      type: object
      additionalProperties: false
      required: [by, id]
      properties:
        by: { type: string, minLength: 1 }
        id: { type: string, minLength: 1 }
    AgentReminderUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 2
      maxProperties: 2
      required: [id]
      properties:
        fireAt: { type: string, minLength: 1 }
        id: { type: string, minLength: 1 }
        repeat: { type: [string, 'null'], minLength: 1 }
        script: { type: [string, 'null'], minLength: 1 }
        title: { type: string, minLength: 1, maxLength: 300 }
      oneOf:
        - required: [fireAt]
        - required: [repeat]
        - required: [script]
        - required: [title]
    AgentReminderCancelRequest:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id: { type: string, minLength: 1 }
    AgentAttachment:
      type: object
      additionalProperties: false
      required: [byteSize, filename, id, mediaType]
      properties:
        byteSize: { type: integer, minimum: 0 }
        filename: { type: string, minLength: 1 }
        id: { type: string, minLength: 1 }
        mediaType: { type: [string, 'null'] }
    AgentAttachmentUploadRequest:
      type: object
      additionalProperties: false
      required: [dataBase64, filename]
      properties:
        dataBase64: { type: string, format: byte }
        filename: { type: string, minLength: 1 }
        mediaType: { type: string, minLength: 1 }
    AgentAttachmentUploadResponse:
      type: object
      additionalProperties: false
      required: [attachment]
      properties:
        attachment:
          $ref: '#/components/schemas/AgentAttachment'
    AgentAttachmentView:
      allOf:
        - $ref: '#/components/schemas/AgentAttachment'
        - type: object
          required: [dataBase64]
          properties:
            dataBase64: { type: string, format: byte }
    AgentAttachmentViewResponse:
      type: object
      additionalProperties: false
      required: [attachment]
      properties:
        attachment:
          $ref: '#/components/schemas/AgentAttachmentView'
    AgentProfile:
      type: object
      additionalProperties: false
      required: [description, handle, isSelf]
      properties:
        description: { type: [string, 'null'] }
        handle: { type: string, minLength: 1 }
        isSelf: { type: boolean }
    AgentProfileResponse:
      type: object
      additionalProperties: false
      required: [profile]
      properties:
        profile:
          $ref: '#/components/schemas/AgentProfile'
    AgentProfileUpdateRequest:
      type: object
      additionalProperties: false
      required: [description]
      properties:
        description: { type: string, minLength: 1, maxLength: 500 }
    AgentReactionRequest:
      type: object
      additionalProperties: false
      required: [emoji, messageId]
      properties:
        emoji: { type: string, minLength: 1 }
        messageId: { type: string, minLength: 1 }
        remove: { type: boolean }
    AgentReactionResponse:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          $ref: '#/components/schemas/AgentMessage'
    AgentSkillId:
      type: string
      pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$'
    AgentSkillSummary:
      type: object
      additionalProperties: false
      required: [description, editable, enabledForYou, id, name]
      properties:
        description: { type: string }
        editable: { type: boolean }
        enabledForYou: { type: boolean }
        id:
          $ref: '#/components/schemas/AgentSkillId'
        name: { type: string }
    AgentSkillListResponse:
      type: object
      additionalProperties: false
      required: [skills]
      properties:
        skills:
          type: array
          items:
            $ref: '#/components/schemas/AgentSkillSummary'
    AgentSkillViewResponse:
      allOf:
        - $ref: '#/components/schemas/AgentSkillSummary'
        - type: object
          required: [content, hash, supportFiles]
          properties:
            content: { type: string }
            hash: { type: string }
            supportFiles:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [hash, path]
                properties:
                  hash: { type: string }
                  path: { type: string }
    AgentSkillCreateRequest:
      type: object
      additionalProperties: false
      required: [content, description, name]
      properties:
        content: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
    AgentSkillCreateResponse:
      type: object
      additionalProperties: false
      required: [skill]
      properties:
        skill:
          $ref: '#/components/schemas/AgentSkillSummary'
    AgentSkillPatchRequest:
      type: object
      additionalProperties: false
      required: [content, expectedHash, skillId]
      properties:
        content: { type: string, minLength: 1 }
        expectedHash: { type: string, minLength: 1 }
        skillId:
          $ref: '#/components/schemas/AgentSkillId'
    AgentSkillWriteFileRequest:
      type: object
      additionalProperties: false
      required: [content, expectedHash, filePath, skillId]
      properties:
        content: { type: string }
        expectedHash: { type: [string, 'null'], minLength: 1 }
        filePath: { type: string, minLength: 1 }
        skillId:
          $ref: '#/components/schemas/AgentSkillId'
    AgentSkillChange:
      type: object
      additionalProperties: false
      required: [afterHash, beforeHash, path, skillId]
      properties:
        afterHash: { type: string }
        beforeHash: { type: [string, 'null'] }
        path: { type: string }
        skillId:
          $ref: '#/components/schemas/AgentSkillId'
    AgentSkillChangeResponse:
      type: object
      additionalProperties: false
      required: [change]
      properties:
        change:
          $ref: '#/components/schemas/AgentSkillChange'
    Id:
      type: string
      minLength: 1
    ChatId:
      type: string
      pattern: '^cht_[A-Za-z0-9_-]+$'
    MessageId:
      type: string
      pattern: '^msg_[A-Za-z0-9_-]+$'
    ResponseId:
      type: string
      pattern: '^rsp_[A-Za-z0-9_-]+$'
    TurnPromptEvidence:
      type: object
      additionalProperties: false
      required:
        - run_id
        - captured_at
        - instructions
        - prompt
      properties:
        run_id:
          $ref: '#/components/schemas/RunId'
