openapi: 3.1.0
info:
  title: Tavern API
  version: 0.1.0
  summary: OpenAPI contract for Tavern Runtime chat and realtime clients.
  description: >
    Tavern API is the runtime-hosted contract for clients, bots, webhooks,
    automations, agent runtime, and tests. This first slice covers durable
    chat state and realtime recovery.
servers:
  - url: http://127.0.0.1:18790
    description: Local Tavern Runtime
tags:
  - name: Chats
  - name: Messages
  - name: Realtime
paths:
  /api/chats:
    get:
      operationId: listChats
      tags: [Chats]
      summary: List chats.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: reader_id
          in: query
          schema:
            $ref: '#/components/schemas/UserParticipantId'
      responses:
        '200':
          description: Chats ordered by recent activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListChatsResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      operationId: createChat
      tags: [Chats]
      summary: Create a chat.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatRequest'
      responses:
        '201':
          description: Created chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '200':
          description: Existing chat returned for an idempotent request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}:
    get:
      operationId: getChat
      tags: [Chats]
      summary: Get a chat.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: reader_id
          in: query
          schema:
            $ref: '#/components/schemas/UserParticipantId'
      responses:
        '200':
          description: Chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/messages:
    get:
      operationId: listChatMessages
      tags: [Messages]
      summary: List chat messages by sequence.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: after_sequence
          in: query
          schema:
            type: integer
            minimum: 0
        - name: before_sequence
          in: query
          schema:
            type: integer
            minimum: 1
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Messages ordered by ascending sequence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      operationId: createChatMessage
      tags: [Messages]
      summary: Create a durable chat message.
      description: >
        Message creation is durable first. Duplicate message ids or duplicate
        nonces within a chat return the existing receipt instead of creating a
        second row.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Created message receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageReceipt'
        '200':
          description: Existing message receipt returned for idempotent retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/messages/search:
    get:
      operationId: searchChatMessages
      tags: [Messages]
      summary: Search chat messages by text.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Matching messages ordered by descending sequence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/timeline:
    get:
      operationId: getChatTimeline
      tags: [Chats]
      summary: Read one turn-aligned page of chat history.
      description: >
        Pages walk backward from the newest message by per-chat message
        sequence. A page carries whole turn units: its message window plus
        every response anchored to a window message by request or reply,
        with that response's full activity and artifacts. Windows extend
        downward so an in-window reply always ships with its request
        message; a turn whose request and reply straddle a page boundary is
        anchored to both pages and deduplicates by id. Responses with no
        message anchor ride the latest page only.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: before_sequence
          in: query
          description: >
            Exclusive upper bound on message sequence. Omit for the latest
            page; pass the previous page's next_before_sequence to walk
            older history.
          schema:
            type: integer
            minimum: 1
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: One turn-aligned timeline page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTimelinePage'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/responses/{response_id}/evidence:
    get:
      operationId: getResponseEvidence
      tags: [Chats]
      summary: Read one turn's execution evidence.
      description: >
        A turn's execution record — its activity and artifacts plus the
        owning response — queried on demand. Evidence never rides the chat
        timeline; consumers fetch it per turn.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - $ref: '#/components/parameters/ResponseId'
      responses:
        '200':
          description: One turn's execution evidence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEvidence'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/deliveries:
    post:
      operationId: createChatDelivery
      tags: [Messages]
      summary: Create an agent delivery and assistant message.
      description: >
        Delivery ids are idempotent. The nested assistant message still uses
        durable message identity; duplicate assistant message ids link the
        delivery to the existing message instead of creating a second message
        row.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeliveryRequest'
      responses:
        '201':
          description: Delivery receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryReceipt'
        '200':
          description: Existing delivery receipt returned for idempotent retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/responses:
    get:
      operationId: listChatResponses
      tags: [Chats]
      summary: List chat responses by update time.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: after_sequence
          in: query
          schema:
            type: integer
            minimum: 0
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Responses for one chat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponsesResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      operationId: createChatResponse
      tags: [Chats]
      summary: Create or update a durable chat response.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertResponseRequest'
      responses:
        '200':
          description: Current response state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '201':
          description: Created response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/responses/{response_id}/activity:
    post:
      operationId: upsertResponseActivity
      tags: [Chats]
      summary: Create or update durable response activity.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - $ref: '#/components/parameters/ResponseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertResponseActivityRequest'
      responses:
        '200':
          description: Current response activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseActivity'
        '201':
          description: Created response activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseActivity'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/activity/{activity_id}:
    get:
      operationId: getResponseActivity
      tags: [Chats]
      summary: Get durable response activity by id.
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Response activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseActivity'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/artifacts:
    post:
      operationId: createChatArtifact
      tags: [Chats]
      summary: Create or update a durable chat artifact.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertArtifactRequest'
      responses:
        '200':
          description: Current artifact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatArtifact'
        '201':
          description: Created artifact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatArtifact'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/read:
    post:
      operationId: markChatRead
      tags: [Chats]
      summary: Mark a chat read through a sequence.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkReadRequest'
      responses:
        '200':
          description: Read receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/chats/{chat_id}/clear:
    post:
      operationId: clearChat
      tags: [Chats]
      summary: Clear a chat's visible history.
      description: >
        Soft-deletes every message and response currently in the chat in one
        operation. Rows keep their sequence slots; new work after the clear
        appears normally.
      parameters:
        - $ref: '#/components/parameters/ChatId'
      responses:
        '200':
          description: Clear receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearChatReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/responses/{response_id}:
    delete:
      operationId: deleteResponse
      tags: [Chats]
      summary: Soft delete a response and its activity.
      parameters:
        - $ref: '#/components/parameters/ResponseId'
      responses:
        '200':
          description: Deleted response receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponseReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/messages/{message_id}:
    get:
      operationId: getMessage
      tags: [Messages]
      summary: Get a message by id.
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
        default:
          $ref: '#/components/responses/Error'
    delete:
      operationId: deleteMessage
      tags: [Messages]
      summary: Soft delete a message.
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Deleted message receipt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMessageReceipt'
        default:
          $ref: '#/components/responses/Error'
  /api/turns/{run_id}/prompt:
    get:
      operationId: getTurnPrompt
      tags: [Chats]
      summary: Get the prompt evidence captured for one agent turn.
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Turn prompt evidence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnPromptEvidence'
        default:
          $ref: '#/components/responses/Error'
  /api/events:
    get:
      operationId: listEvents
      tags: [Realtime]
      summary: List recent durable events.
      parameters:
        - name: after_cursor
          in: query
          description: Return events after this cursor (exclusive). Omit to read from the beginning.
          schema:
            type: string
        - name: recipient_id
          in: query
          description: Include private events addressed to this recipient.
          schema:
            $ref: '#/components/schemas/ParticipantId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Events ordered by ascending cursor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        default:
          $ref: '#/components/responses/Error'
  /api/events/ws:
    get:
      operationId: connectEvents
      tags: [Realtime]
      summary: Subscribe to event notifications.
      description: >
        WebSocket delivery is best effort and live-only. Clients recover missed
        state by refetching durable resources.
      parameters:
        - name: recipient_id
          in: query
          description: Include private events addressed to this recipient.
          schema:
            $ref: '#/components/schemas/ParticipantId'
      responses:
        '101':
          description: WebSocket upgrade. Messages are ChatEvent objects.
        default:
          $ref: '#/components/responses/Error'
components:
  parameters:
    ChatId:
      name: chat_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ChatId'
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RunId'
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    MessageId:
      name: message_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/MessageId'
    ResponseId:
      name: response_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ResponseId'
    ActivityId:
      name: activity_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ActivityId'
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Id:
      type: string
      minLength: 1
    ChatId:
      type: string
      pattern: '^cht_[A-Za-z0-9_-]+$'
    MessageId:
      type: string
      pattern: '^msg_[A-Za-z0-9_-]+$'
    ResponseId:
      type: string
      pattern: '^rsp_[A-Za-z0-9_-]+$'
    TurnPromptRecallHit:
      type: object
      additionalProperties: false
      required:
        - path
        - title
        - score
        - snippet
      properties:
        path:
          type: string
        title:
          type: string
        score:
          type: number
        snippet:
          type: string
    TurnPromptEvidence:
      type: object
      additionalProperties: false
      required:
        - run_id
        - captured_at
        - instructions
        - prompt
        - recall
      properties:
        run_id:
          $ref: '#/components/schemas/RunId'
        captured_at:
          type: string
          format: date-time
        instructions:
          type: string
        prompt:
          type: string
        recall:
          type: array
          items:
            $ref: '#/components/schemas/TurnPromptRecallHit'
    ActivityId:
      type: string
      pattern: '^act_[A-Za-z0-9_-]+$'
    ArtifactId:
      type: string
      pattern: '^art_[A-Za-z0-9_-]+$'
    ParticipantId:
      type: string
      pattern: '^(usr|agt|sys|ext)_[A-Za-z0-9_-]+$'
    UserParticipantId:
      type: string
      pattern: '^usr_[A-Za-z0-9_-]+$'
    AgentParticipantId:
      type: string
      pattern: '^agt_[A-Za-z0-9_-]+$'
    EventId:
      type: string
      pattern: '^evt_[A-Za-z0-9_-]+$'
    DeliveryId:
      type: string
      pattern: '^del_[A-Za-z0-9_-]+$'
    RunId:
      type: string
      pattern: '^run_[A-Za-z0-9_-]+$'
    Timestamp:
      type: string
      format: date-time
    JsonObject:
      type: object
      additionalProperties: true
    Chat:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - title
        - created_at
        - updated_at
        - last_activity_at
        - last_message_sequence
        - unread_count
        - active_turn_participant_ids
        - participants
        - metadata
      properties:
        id:
          $ref: '#/components/schemas/ChatId'
        kind:
          type: string
          enum: [channel, dm, task]
        title:
          type: [string, 'null']
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
        last_activity_at:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        last_message_sequence:
          type: integer
          minimum: 0
        # Messages past the chat's human reader's read receipt, excluding the
        # reader's own messages. Null on projections that skip the count.
        unread_count:
          type: [integer, 'null']
          minimum: 0
        active_turn_participant_ids:
          type: array
          items:
            type: string
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
        metadata:
          $ref: '#/components/schemas/JsonObject'
    CreateChatRequest:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          $ref: '#/components/schemas/ChatId'
        kind:
          type: string
          enum: [channel, dm, task]
        title:
          type: [string, 'null']
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
        metadata:
          $ref: '#/components/schemas/JsonObject'
    ListChatsResponse:
      type: object
      additionalProperties: false
      required:
        - chats
        - next_cursor
      properties:
        chats:
          type: array
          items:
            $ref: '#/components/schemas/Chat'
        next_cursor:
          type: [string, 'null']
    Participant:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - label
        - metadata
      properties:
        id:
          $ref: '#/components/schemas/ParticipantId'
        kind:
          type: string
          enum: [user, agent, system, external, plugin]
        label:
          type: [string, 'null']
        metadata:
          $ref: '#/components/schemas/JsonObject'
    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - id
        - chat_id
        - sequence
        - author
        - role
        - content
        - attachments
        - nonce
        - parent_message_id
        - thread_root_id
        - delivery_id
        - created_at
        - deleted_at
        - metadata
      properties:
        id:
          $ref: '#/components/schemas/MessageId'
        chat_id:
          $ref: '#/components/schemas/ChatId'
        sequence:
          type: integer
          minimum: 1
        author:
          $ref: '#/components/schemas/Participant'
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/JsonObject'
        nonce:
          type: [string, 'null']
        parent_message_id:
          oneOf:
            - $ref: '#/components/schemas/MessageId'
            - type: 'null'
        thread_root_id:
          oneOf:
            - $ref: '#/components/schemas/MessageId'
            - type: 'null'
        delivery_id:
          oneOf:
            - $ref: '#/components/schemas/DeliveryId'
            - type: 'null'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        deleted_at:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        metadata:
          $ref: '#/components/schemas/JsonObject'
    CreateMessageRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - author_id
        - role
        - content
      properties:
        id:
          $ref: '#/components/schemas/MessageId'
        author_id:
          $ref: '#/components/schemas/ParticipantId'
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/JsonObject'
        nonce:
          type: string
        parent_message_id:
          oneOf:
            - $ref: '#/components/schemas/MessageId'
            - type: 'null'
        thread_root_id:
          oneOf:
            - $ref: '#/components/schemas/MessageId'
            - type: 'null'
        metadata:
          $ref: '#/components/schemas/JsonObject'
    ChatMessageReceipt:
      type: object
      additionalProperties: false
      required:
        - message
        - cursor
        - idempotent
      properties:
        message:
          $ref: '#/components/schemas/ChatMessage'
        cursor:
          type: string
        idempotent:
          type: boolean
    ListMessagesResponse:
      type: object
      additionalProperties: false
      required:
        - messages
        - next_sequence
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        next_sequence:
          type: [integer, 'null']
    CreateDeliveryRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - agent_id
        - message
      properties:
        id:
          $ref: '#/components/schemas/DeliveryId'
        agent_id:
          $ref: '#/components/schemas/AgentParticipantId'
        turn_id:
          oneOf:
            - $ref: '#/components/schemas/RunId'
            - type: 'null'
        message:
          $ref: '#/components/schemas/CreateMessageRequest'
        metadata:
          $ref: '#/components/schemas/JsonObject'
    DeliveryReceipt:
      type: object
      additionalProperties: false
      required:
        - id
        - message
        - cursor
        - idempotent
      properties:
        id:
          $ref: '#/components/schemas/DeliveryId'
        message:
          $ref: '#/components/schemas/ChatMessage'
        cursor:
          type: string
        idempotent:
          type: boolean
    ResponseStatus:
      type: string
      enum: [queued, running, completed, failed, cancelled]
    ResponseActivityKind:
      type: string
      enum: [reasoning, tool_call, tool_result, command, message, artifact, widget, custom]
    ChatResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - chat_id
        - status
        - participant_id
        - request_message_id
        - response_message_id
        - summary
        - created_at
        - updated_at
        - completed_at
        - deleted_at
        - metadata
      properties:
        id:
          $ref: '#/components/schemas/ResponseId'
        chat_id:
          $ref: '#/components/schemas/ChatId'
        participant_id:
          $ref: '#/components/schemas/ParticipantId'
        request_message_id:
          oneOf:
            - $ref: '#/components/schemas/MessageId'
            - type: 'null'
        response_message_id:
          oneOf:
            - $ref: '#/components/schemas/MessageId'
            - type: 'null'
        status:
          $ref: '#/components/schemas/ResponseStatus'
        summary:
