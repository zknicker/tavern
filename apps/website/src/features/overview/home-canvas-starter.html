<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="tavern-canvas-height" content="140">
        <!--
            The shipped home canvas starter (specs/home-brief.md). Rendered as
            the fallback whenever no agent has authored workbench/home.html.
            Deliberately timeless: no clock claims, no data. Freshness is the
            Home brief automation's job.
        -->
        <style>
        body {
            margin: 0;
            font-family: var(--font-heading, sans-serif);
            color: var(--foreground, inherit);
            background: transparent;
        }

        .brief {
            max-width: 52ch;
            margin: 0;
            font-size: 30px;
            font-style: italic;
            font-weight: 300;
            line-height: 1.375;
            color: var(--muted-foreground);
        }

        .grotto {
            margin-right: -0.08em;
            font-family: "Reel Variable", var(--font-heading, sans-serif);
            font-size: 1.5em;
            font-variation-settings:
                "HGHT" 46,
                "wght" 600;
            font-style: normal;
            line-height: 1;
            color: light-dark(var(--brand), color-mix(in srgb, var(--brand) 52%, white));
            letter-spacing: 0.035em;
            white-space: nowrap;
        }
        </style>
    </head>
    <body>
        <p class="brief">
            Welcome back to the <span class="grotto">Grotto</span>. The lights are on, and the day
            is yours.
        </p>
    </body>
</html>
