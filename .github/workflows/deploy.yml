name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy
        working-directory: /Users/zknicker/srv/tavern
        run: |
          # Pull latest code into the deployed checkout
          git pull --ff-only

          # Build local artifacts and restart the stack
          ./scripts/deploy-local.sh

          # Show status
          docker compose -p tavern --env-file /Users/zknicker/srv/tavern/.env -f compose.yml ps

      - name: Notify Discord
        if: always()
        continue-on-error: true
        uses: merchbaseco/captainhook/.github/actions/deploy-notify@v1
        with:
          discord-webhook-url: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          job-status: ${{ job.status }}
