services:
  server:
    image: oven/bun:1.3.5-alpine
    container_name: tavern-server
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /tmp
      NODE_ENV: production
      DATABASE_PATH: ${DATABASE_PATH:-/data/tavern.sqlite}
    command:
      [
        'sh',
        '-lc',
        'mkdir -p /data/ingest/honcho && touch /data/ingest/honcho/reasoning-traces.jsonl && cd apps/server && exec bun src/index.ts',
      ]
    volumes:
      - .:/app
      - tavern_node_modules:/app/node_modules
      - tavern_data:/data
      - /Users/zknicker/data/shared/honcho-telemetry:/data/ingest/honcho
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://127.0.0.1:8080/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tavern
      - honcho_default

  caddy:
    image: caddy:alpine
    container_name: tavern-caddy
    restart: unless-stopped
    ports:
      - '127.0.0.1:${HOST_PORT:-8094}:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./apps/website/dist:/srv:ro
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tavern

volumes:
  tavern_node_modules:
  tavern_data:

networks:
  tavern:
    driver: bridge
  honcho_default:
    external: true
